name: Update Legislation

on:
  schedule:
    - cron: '0 15 * * *'  # 7:00 AM PST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-legislation
  cancel-in-progress: true

jobs:
  update-legislation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Discover active sessions
        id: sessions
        run: |
          SESSIONS=$(pnpm --silent discover-sessions)
          echo "Active sessions:"
          echo "$SESSIONS"
          echo "sessions<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SESSIONS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Restore classification cache
        uses: actions/cache@v4
        with:
          path: .cache/
          key: legislation-cache-${{ github.run_id }}
          restore-keys: |
            legislation-cache-

      - name: Fetch and refine legislation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "${{ steps.sessions.outputs.sessions }}" | while read -r YEAR SESSION; do
            [ -z "$YEAR" ] && continue

            echo ""
            echo "=========================================="
            echo "Fetching ${YEAR} --session=${SESSION}"
            echo "=========================================="
            pnpm fetch-legislation "$YEAR" --session="$SESSION"

            # Determine session directory name
            case "$SESSION" in
              R1) SESSION_DIR="${YEAR}-regular-session" ;;
              S1) SESSION_DIR="${YEAR}-first-special-session" ;;
              S2) SESSION_DIR="${YEAR}-second-special-session" ;;
              S3) SESSION_DIR="${YEAR}-third-special-session" ;;
              *) echo "Unknown session type: $SESSION"; continue ;;
            esac

            BILL_DIR="content/legislation/${SESSION_DIR}"
            if [ ! -d "$BILL_DIR" ]; then
              echo "No directory found: $BILL_DIR"
              continue
            fi

            echo "Refining bills in ${BILL_DIR}..."
            for file in "${BILL_DIR}"/*.md; do
              BASENAME=$(basename "$file" .md)
              [ "$BASENAME" = "_index" ] && continue

              echo "  Refining ${BASENAME}..."
              pnpm refine-legislation "$BASENAME" --year="$YEAR" --session="$SESSION" || echo "  Warning: failed to refine ${BASENAME}"

              # Respect API rate limits
              sleep 2
            done
          done

      - name: Save classification cache
        uses: actions/cache/save@v4
        with:
          path: .cache/
          key: legislation-cache-${{ github.run_id }}

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check for changes in legislation or people content
          if [ -z "$(git status --porcelain content/legislation/ content/people/)" ]; then
            echo "No changes detected."
            exit 0
          fi

          git config user.name 'oregonhousingproject[bot]'
          git config user.email 'info@oregonhousingproject.org'

          # Ensure label exists
          gh label create "legislation-update" --color "0e8a16" --description "Automated legislation update" 2>/dev/null || true

          # Close existing PRs with the legislation-update label
          EXISTING_PRS=$(gh pr list --label "legislation-update" --state open --json number --jq '.[].number')
          for pr in $EXISTING_PRS; do
            echo "Closing existing PR #${pr}..."
            gh pr close "$pr" --delete-branch || true
          done

          # Create branch and PR
          BRANCH_NAME="auto/update-legislation-$(date +%Y-%m-%d)-${{ github.run_number }}"
          git checkout -b "$BRANCH_NAME"
          git add content/legislation/ content/people/
          git commit -m "Update legislation data"
          git push -u origin "$BRANCH_NAME"

          gh pr create \
            --title "Update legislation data" \
            --body "Automated daily legislation update. Fetches latest bill data and refines all bills with sponsors, history, documents, and testimony." \
            --base main \
            --head "$BRANCH_NAME" \
            --label "legislation-update" \
            --reviewer danielbachhuber
