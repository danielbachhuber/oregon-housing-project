name: Fetch Housing Articles

on:
  schedule:
    - cron: '0 14 * * *'  # 6:00 AM PST
    - cron: '0 2 * * *'   # 6:00 PM PST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  search-and-process:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        source: [opb, wweek, occ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Fetch housing articles from ${{ matrix.source }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm fetch-housing-articles -- ${{ matrix.source }}

      - name: Upload new articles
        uses: actions/upload-artifact@v4
        with:
          name: articles-${{ matrix.source }}
          path: content/news-coverage/
          if-no-files-found: ignore

  create-prs:
    needs: search-and-process
    if: always() && needs.search-and-process.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: articles-*

      - name: Create PRs for new articles
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name 'oregonhousingproject[bot]'
          git config user.email 'info@oregonhousingproject.org'

          # Collect new article files from artifacts into a staging directory
          mkdir -p staged-articles
          for dir in artifacts/articles-*/; do
            [ -d "$dir" ] || continue
            find "$dir" -name '*.md' -not -path '*/data/*' | while read -r src; do
              rel="${src#$dir}"
              dest="staged-articles/$rel"
              mkdir -p "$(dirname "$dest")"
              cp "$src" "$dest"
            done
          done

          # Filter to only files that don't already exist in the repo
          NEW_FILES=""
          for file in $(find staged-articles -name '*.md' 2>/dev/null); do
            rel="${file#staged-articles/}"
            dest="content/news-coverage/$rel"
            if [ ! -f "$dest" ]; then
              NEW_FILES="$NEW_FILES $rel"
            fi
          done
          NEW_FILES=$(echo "$NEW_FILES" | xargs)

          if [ -z "$NEW_FILES" ]; then
            echo "No new articles found."
            exit 0
          fi

          echo "Found new articles: $NEW_FILES"
          git fetch origin main

          for rel in $NEW_FILES; do
             file="content/news-coverage/$rel"
             echo "Processing $file..."

             # Extract slug from filename for branch name
             BASENAME=$(basename "$rel" .md)
             BRANCH_NAME="housing-article-${BASENAME}"

             # Skip if a branch already exists (previous run created a PR)
             if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
               echo "  -> Branch $BRANCH_NAME already exists, skipping."
               continue
             fi
             git checkout -b "$BRANCH_NAME" origin/main

             # Copy the article file from staging
             mkdir -p "$(dirname "$file")"
             cp "staged-articles/$rel" "$file"

             # Auto-link legislation, people, and cities
             pnpm refine-internal-links --write "$file"

             # Add the file
             git add "$file"

             # Commit
             TITLE=$(grep '^title' "$file" | head -n 1 | sed 's/title = ["'"'"']//;s/["'"'"']$//')
             git commit -m "Add article: title = \"$TITLE\""

             # Push
             git push -u origin "$BRANCH_NAME"

             # Create PR
             gh pr create \
               --title "New Housing Article: $TITLE" \
               --body "Automated housing article discovery.\n\nFile: $file" \
               --base main \
               --head "$BRANCH_NAME" \
               --reviewer danielbachhuber

             echo "Created PR for $file"

             # Switch back to main for next loop
             git checkout main
          done

      - name: Update Processed URLs State
        run: |
          git config user.name 'oregonhousingproject[bot]'
          git config user.email 'info@oregonhousingproject.org'
          git checkout main

          # Copy state files from artifacts
          for dir in artifacts/articles-*/; do
            [ -d "$dir" ] || continue
            if [ -d "${dir}data" ]; then
              cp "${dir}data"/processed-*-urls.txt content/news-coverage/data/ 2>/dev/null || true
            fi
          done

          # Check if state files have changed
          if [[ -n $(git status --porcelain content/news-coverage/data/processed-*-urls.txt) ]]; then
            echo "State files changed. Committing updates."
            git add content/news-coverage/data/processed-*-urls.txt
            git commit -m "Update processed URLs state [skip ci]"
            git push
          else
            echo "No changes to state files."
          fi
